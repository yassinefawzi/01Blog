<div class="Main-class">
  <div class="nav-bar">
    <div class="nav-left">
      <h2 class="nav-title">01Blog</h2>
    </div>

    <div class="nav-search">
      <div class="search-wrapper">
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
          placeholder="Type in search..."
        />
      </div>
    </div>

    <div class="nav-actions">
      <button class="notification">Notifications</button>
      <button class="create-post" (click)="openCreatePost()">Create Post</button>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </div>
  <div class="main-content">
    <aside class="side-bar">
      <div class="profile-bar">My Profile</div>
      <div class="messages-bar">Messages</div>
	  <div class="friends-bar">Friends</div>
      <div class="dark-bar">Appearance</div>
    </aside>

    <main class="posts-section">
      <div class="posts-container">
        <div class="post" *ngFor="let post of posts">
          <div class="post-header">
            <span class="post-author">@{{ post.author }}</span>
            <span class="post-time">{{ post.createdAt | date: 'medium' }}</span>
          </div>

          <div class="post-body">
            <h3 class="post-title">{{ post.title }}</h3>
            <p class="post-content">{{ post.content }}</p>
          </div>

          <div class="post-footer">
            <div class="reactions">
              <button class="reaction-btn like" (click)="updateLike(post.id)">👍 {{ post.likes }}</button>
              <button class="reaction-btn dislike" (click)="updateDislike(post.id)">👎 {{ post.dislikes }}</button>
            </div>
            <button class="comment-btn">💬 {{ post.commentCount }} Comments</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <app-create-post
    *ngIf="isCreateModalOpen"
    (postCreated)="handlePostCreated($event)"
    (close)="closeCreateModal()"
  >
  </app-create-post>
</div>
